version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: sillage_bleu
      POSTGRES_USER: sillage
      POSTGRES_PASSWORD: sillage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/api-gateway/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sillage"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ../backend/api-gateway
      dockerfile: ../../infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend/web
      dockerfile: ../../infra/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    env_file: ../.env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
